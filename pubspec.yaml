name: devportal_internal
description: "Internal developer portal admin console (Flutter Web) — cinematic, mock-first build."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  devportal_shared:
    path: ../devportal-flutter-shared
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Bundle the Roboto family so the console renders fully offline / behind a
  # corporate proxy. Without this, web (CanvasKit) fetches the default font
  # from fonts.gstatic.com at runtime — blocked networks then show no text.
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Light.ttf
          weight: 300
        - asset: fonts/Roboto-Regular.ttf
          weight: 400
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-Black.ttf
          weight: 900
        - asset: fonts/Roboto-Italic.ttf
          style: italic
          weight: 400
        - asset: fonts/Roboto-BoldItalic.ttf
          style: italic
          weight: 700
